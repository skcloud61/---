{% extends 'base.html' %}
{% block content %}

<div class="container mt-4">

  <!-- 제목 -->
  <div class="mb-4">
    <h2>✏️ 글 작성</h2>
  </div>

  <!-- 작성 폼 -->
  <form method="POST">
    <div class="mb-3">
      <label class="form-label fw-bold">제목</label>
      <input type="text" name="title" class="form-control" placeholder="제목을 입력해주세요" required>
    </div>
    <div class="mb-3">
      <label class="form-label fw-bold">내용</label>
      <textarea name="content" class="form-control" rows="10" placeholder="내용을 입력해주세요" required></textarea>
    </div>

    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-warning">✅ 등록</button>
      <a href="{{ url_for('board') }}" class="btn btn-secondary">❌ 취소</a>
    </div>
  </form>

</div>

{% endblock %}
