{% extends 'base.html' %}
{% block content %}

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow">
        <div class="card-body p-4">

          <h2 class="text-center mb-4">📤 PDF 자료 업로드</h2>

          <form method="POST" enctype="multipart/form-data">
            <div class="mb-3">
              <label class="form-label">제목</label>
              <input type="text" name="title"
                     class="form-control"
                     placeholder="자료 제목 입력" required>
            </div>
            <div class="mb-3">
              <label class="form-label">학년</label>
              <select name="grade" class="form-select" required>
                {% for g in grades %}
                  <option value="{{ g }}">{{ g }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label">유형</label>
              <select name="category" class="form-select" required>
                {% for c in categories %}
                  <option value="{{ c }}">{{ c }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label">PDF 파일</label>
              <input type="file" name="file"
                     class="form-control"
                     accept=".pdf" required>
            </div>
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-dark w-100">업로드</button>
              <a href="{{ url_for('index') }}" class="btn btn-secondary w-100">취소</a>
            </div>
          </form>

        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
