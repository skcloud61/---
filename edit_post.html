{% extends 'base.html' %}
{% block content %}
<div class="container mt-4" style="max-width:700px;">
  <h4 class="mb-4">✏️ 게시글 수정</h4>
  <form method="POST">
    <div class="mb-3">
      <label class="form-label fw-bold">제목</label>
      <input type="text" name="title" class="form-control"
             value="{{ post.title }}" maxlength="100" required>
    </div>
    <div class="mb-3">
      <label class="form-label fw-bold">내용</label>
      <textarea name="content" class="form-control"
                rows="10" maxlength="2000" required>{{ post.content }}</textarea>
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-dark">수정 완료</button>
      <a href="{{ url_for('view_post', post_id=post.id) }}"
         class="btn btn-outline-secondary">취소</a>
    </div>
  </form>
</div>
{% endblock %}
